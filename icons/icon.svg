<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a8cff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
    <!-- Clip OpenAI logo to left half only -->
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="64" height="128"/>
    </clipPath>
    <!-- Clip speaker+waves to right half only -->
    <clipPath id="rightHalf">
      <rect x="64" y="0" width="64" height="128"/>
    </clipPath>
    <!-- Clip everything to rounded rect -->
    <clipPath id="roundedRect">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="128" height="128" rx="28" ry="28" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>

  <!-- ═══════════════════════════════════════════
       LEFT HALF: OpenAI logo centered at (64,64)
       The OpenAI bloom is ~52px wide, centered at x=32 (left half center)
       ═══════════════════════════════════════════ -->
  <g clip-path="url(#leftHalf)">
    <!--
      OpenAI logo: 8 overlapping rounded rectangles rotated 0°,45°,90°,135°,180°,225°,270°,315°
      Each petal: width=14, height=34, rx=7, centered at origin, then translated to (32,64)
    -->
    <g transform="translate(40,64)" fill="white">
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(0)"   opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(45)"  opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(90)"  opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(135)" opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(180)" opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(225)" opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(270)" opacity="1"/>
      <rect x="-7" y="-28" width="14" height="34" rx="7" transform="rotate(315)" opacity="1"/>
    </g>
  </g>

  <!-- Center divider line -->
  <line x1="64" y1="18" x2="64" y2="110" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════
       RIGHT HALF: Speaker + sound waves
       Speaker centered in right half (x=64..128, center at x=96)
       ═══════════════════════════════════════════ -->
  <g clip-path="url(#rightHalf)">
    <!-- Speaker body: box + triangle horn -->
    <rect x="66" y="53" width="14" height="22" rx="2" fill="white"/>
    <polygon points="80,47 80,81 98,91 98,37" fill="white"/>

    <!-- Sound wave 1 (small) -->
    <path d="M100,55 Q108,64 100,73" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Sound wave 2 (large) -->
    <path d="M106,47 Q120,64 106,81" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
